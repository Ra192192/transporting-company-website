spring.application.name=cleanup-site
server.port=8090
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cleanup_site}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:cleanup_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:cleanup_password}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
